<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SzS Tracker Launch Page</title>
  <style>
    body{margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:#f7fbff;color:#172335}
    .wrap{max-width:780px;margin:60px auto;padding:0 16px}
    .card{background:#fff;border:1px solid #d8e2ef;border-radius:16px;padding:24px;box-shadow:0 10px 24px rgba(18,33,53,.08)}
    h1{margin:0 0 8px;font-size:28px}
    p{color:#5c6a80;line-height:1.55}
    code{background:#f3f8ff;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>SzS Tracker</h1>
      <p>This GitHub page is the frontend. It reads and writes through the Apps Script web app URL you set in <code>config.js</code>.</p>
      <p>Upload <code>index.html</code> and <code>config.js</code> to GitHub Pages, then deploy the Apps Script backend separately using <code>Code.gs</code>.</p>
    </div>
  </div>
</body>
</html>
